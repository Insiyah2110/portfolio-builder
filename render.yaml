services:
  - type: web
    name: portfolio-builder
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_PATH
        value: /var/data/portfolio_builder.sqlite3
    disks:
      - name: portfolio-builder-data
        mountPath: /var/data
        sizeGB: 1
